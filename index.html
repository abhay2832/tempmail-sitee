<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #262626;
            text-decoration: none;
        }

        .search-bar {
            background: #efefef;
            border-radius: 8px;
            padding: 8px 16px;
            width: 215px;
            font-size: 14px;
        }

        .icons {
            display: flex;
            gap: 22px;
        }

        .icon {
            font-size: 24px;
            cursor: pointer;
        }

        /* Stories */
        .stories {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .story {
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-avatar {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: 2px solid #c13584;
            padding: 2px;
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            margin-bottom: 8px;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .story-name {
            font-size: 12px;
            font-weight: 600;
        }

        /* Posts */
        .post {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .post-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-user {
            font-weight: 600;
            font-size: 14px;
        }

        .post-location {
            font-size: 12px;
            color: #a19f9d;
        }

        .post-image {
            width: 100%;
            height: 600px;
            object-fit: cover;
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #efefef;
        }

        .action-btn.liked {
            color: #ed4956;
        }

        .post-stats {
            padding: 0 16px 16px;
        }

        .likes {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .caption {
            margin-bottom: 12px;
        }

        .username {
            font-weight: 600;
        }

        .post-time {
            color: #8e8e8e;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 10px;
            }
            
            .search-bar {
                display: none;
            }
            
            .icons {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <a href="#" class="logo">InstaClone</a>
                <input type="text" class="search-bar" placeholder="Search">
                <div class="icons">
                    <i class="fas fa-home icon"></i>
                    <i class="far fa-comment icon"></i>
                    <i class="far fa-paper-plane icon"></i>
                    <i class="far fa-compass icon"></i>
                    <i class="far fa-heart icon"></i>
                    <i class="far fa-user icon"></i>
                </div>
            </div>
        </div>

        <!-- Stories -->
        <div class="stories">
            <div class="story">
                <div class="story-avatar">
                    <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=64&h=64&fit=crop&crop=face" alt="Your Story">
                </div>
                <div class="story-name">Your Story</div>
            </div>
            <div class="story">
                <div class="story-avatar">
                    <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=64&h=64&fit=crop&crop=face" alt="User 1">
                </div>
                <div class="story-name">john_doe</div>
            </div>
            <div class="story">
                <div class="story-avatar">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=64&h=64&fit=crop&crop=face" alt="User 2">
                </div>
                <div class="story-name">jane_smith</div>
            </div>
            <div class="story">
                <div class="story-avatar">
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=64&h=64&fit=crop&crop=face" alt="User 3">
                </div>
                <div class="story-name">cool_photos</div>
            </div>
        </div>

        <!-- Posts -->
        <div class="post">
            <div class="post-header">
                <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=42&h=42&fit=crop&crop=face" alt="john_doe" class="post-avatar">
                <div>
                    <div class="post-user">john_doe</div>
                    <div class="post-location">New York, NY</div>
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=935&h=600&fit=crop" alt="Post" class="post-image">
            <div class="post-actions">
                <button class="action-btn heart-btn" data-post="1">
                    <i class="far fa-heart"></i>
                </button>
                <button class="action-btn">
                    <i class="far fa-comment"></i>
                </button>
                <button class="action-btn">
                    <i class="far fa-paper-plane"></i>
                </button>
                <div style="flex: 1;"></div>
                <button class="action-btn">
                    <i class="far fa-bookmark"></i>
                </button>
            </div>
            <div class="post-stats">
                <div class="likes">1,234 likes</div>
                <div class="caption">
                    <span class="username">john_doe</span> Amazing sunset in NYC! 🌅 #newyork #sunset #photography
                </div>
                <div class="post-time">2 hours ago</div>
            </div>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=42&h=42&fit=crop&crop=face" alt="jane_smith" class="post-avatar">
                <div>
                    <div class="post-user">jane_smith</div>
                    <div class="post-location">Los Angeles, CA</div>
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?w=935&h=600&fit=crop" alt="Post" class="post-image">
            <div class="post-actions">
                <button class="action-btn heart-btn liked" data-post="2">
                    <i class="fas fa-heart"></i>
                </button>
                <button class="action-btn">
                    <i class="far fa-comment"></i>
                </button>
                <button class="action-btn">
                    <i class="far fa-paper-plane"></i>
                </button>
                <div style="flex: 1;"></div>
                <button class="action-btn">
                    <i class="far fa-bookmark"></i>
                </button>
            </div>
            <div class="post-stats">
                <div class="likes">2,456 likes</div>
                <div class="caption">
                    <span class="username">jane_smith</span> Beach vibes only 🏖️ #california #beach #summer
                </div>
                <div class="post-time">5 hours ago</div>
            </div>
        </div>
    </div>

    <script>
        // Heart button functionality
        document.querySelectorAll('.heart-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const icon = this.querySelector('i');
                const likesEl = this.closest('.post').querySelector('.likes');
                
                if (icon.classList.contains('far')) {
                    icon.classList.remove('far');
                    icon.classList.add('fas');
                    this.classList.add('liked');
                    // Simulate like count increase
                    const likes = parseInt(likesEl.textContent) + 1;
                    likesEl.textContent = likes.toLocaleString() + ' likes';
                } else {
                    icon.classList.remove('fas');
                    icon.classList.add('far');
                    this.classList.remove('liked');
                    const likes = parseInt(likesEl.textContent) - 1;
                    likesEl.textContent = likes.toLocaleString() + ' likes';
                }
            });
        });

        // Smooth scrolling for stories
        document.querySelector('.stories').addEventListener('scroll', function() {
            this.style.scrollSnapType = 'x proximity';
        });
    </script>
</body>
</html>
