<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Temp Mail</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .email-box { background: #e9ecef; padding: 15px; border-radius: 5px; font-size: 18px; font-weight: bold; color: #007bff; margin-bottom: 20px; word-break: break-all; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-new { background: #28a745; } .btn-new:hover { background: #218838; }
        .btn-copy { background: #007bff; } .btn-copy:hover { background: #0069d9; }
        .btn-refresh { background: #ffc107; color: black; } .btn-refresh:hover { background: #e0a800; }
        .inbox { text-align: left; margin-top: 20px; width: 100%; max-width: 500px; }
        .message { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; border-left: 4px solid #007bff; }
        .message span { font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .loader { display: none; margin-top: 10px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fast Temp Mail</h2>
        <div class="email-box" id="emailDisplay">Loading...</div>
        
        <div class="btn-group">
            <button class="btn-new" onclick="getNewEmail()">New Fast Email</button>
            <button class="btn-copy" onclick="copyEmail()">Copy Email</button>
            <button class="btn-refresh" onclick="fetchInbox()">Inbox Refresh</button>
        </div>
        <div class="loader" id="loader">Checking for messages...</div>
    </div>

    <div class="inbox" id="inboxDisplay">
        </div>

    <script>
        let currentEmail = "";
        let currentLogin = "";
        let currentDomain = "";

        // Function to generate a new email
        async function getNewEmail() {
            document.getElementById('emailDisplay').innerText = "Generating...";
            try {
                let response = await fetch('https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1');
                let data = await response.json();
                currentEmail = data[0];
                let parts = currentEmail.split('@');
                currentLogin = parts[0];
                currentDomain = parts[1];
                document.getElementById('emailDisplay').innerText = currentEmail;
                document.getElementById('inboxDisplay').innerHTML = ""; // Clear inbox
            } catch (error) {
                document.getElementById('emailDisplay').innerText = "Error generating email";
            }
        }

        // Function to copy email to clipboard
        function copyEmail() {
            if (!currentEmail) return;
            navigator.clipboard.writeText(currentEmail).then(() => {
                let copyBtn = document.querySelector('.btn-copy');
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = "Copy Email", 2000);
            });
        }

        // Function to fetch emails for the current inbox
        async function fetchInbox() {
            if (!currentLogin || !currentDomain) return;
            
            document.getElementById('loader').style.display = "block";
            document.getElementById('inboxDisplay').innerHTML = "";

            try {
                let response = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${currentLogin}&domain=${currentDomain}`);
                let messages = await response.json();

                if (messages.length === 0) {
                    document.getElementById('inboxDisplay').innerHTML = "<p style='text-align:center; color:#777;'>Inbox is empty. Waiting for Instagram code...</p>";
                } else {
                    for (let msg of messages) {
                        // Fetch individual message details
                        let msgRes = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${currentLogin}&domain=${currentDomain}&id=${msg.id}`);
                        let msgData = await msgRes.json();

                        let msgElement = document.createElement('div');
                        msgElement.className = "message";
                        msgElement.innerHTML = `
                            <span>From: ${msgData.from}</span>
                            <span>Subject: ${msgData.subject}</span>
                            <p>${msgData.textBody || "No text content"}</p>
                        `;
                        document.getElementById('inboxDisplay').appendChild(msgElement);
                    }
                }
            } catch (error) {
                document.getElementById('inboxDisplay').innerHTML = "<p style='text-align:center; color:red;'>Error fetching inbox.</p>";
            }
            document.getElementById('loader').style.display = "none";
        }

        // Auto-generate on load
        window.onload = getNewEmail;
    </script>

</body>
</html>
