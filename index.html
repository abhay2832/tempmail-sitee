<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Bomber Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        select, input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .word-counter {
            text-align: right;
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .country-flag {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 SMS Bomber</h1>
        
        <div class="warning status" id="warningMsg">
            ⚠️ Testing purpose only! Don't spam real numbers.
        </div>

        <form id="smsForm">
            <div class="form-group">
                <label for="countryCode">🌍 Country Code</label>
                <select id="countryCode">
                    <option value="+91">🇮🇳 +91 (India)</option>
                    <option value="+1">🇺🇸 +1 (USA)</option>
                    <option value="+44">🇬🇧 +44 (UK)</option>
                    <option value="+971">🇦🇪 +971 (UAE)</option>
                    <option value="+880">🇧🇩 +880 (Bangladesh)</option>
                    <option value="+92">🇵🇰 +92 (Pakistan)</option>
                    <option value="+966">🇸🇦 +966 (Saudi Arabia)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phoneNumber">📱 Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter phone number (without country code)" required>
            </div>

            <div class="form-group">
                <label for="message">💬 Custom Message</label>
                <textarea id="message" placeholder="Type your message here... (e.g., Hello)" maxlength="500" required></textarea>
                <div class="word-counter" id="wordCounter">0/500 characters</div>
            </div>

            <button type="submit" class="btn" id="startBtn">
                🚀 START BOMBER
            </button>
        </form>

        <div class="status" id="statusMsg"></div>
    </div>

    <script>
        const form = document.getElementById('smsForm');
        const messageInput = document.getElementById('message');
        const wordCounter = document.getElementById('wordCounter');
        const statusMsg = document.getElementById('statusMsg');
        const startBtn = document.getElementById('startBtn');

        // Word counter
        messageInput.addEventListener('input', function() {
            const length = this.value.length;
            wordCounter.textContent = `${length}/500 characters`;
        });

        // Simulate SMS bombing
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const countryCode = document.getElementById('countryCode').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const message = document.getElementById('message').value;
            
            const fullNumber = countryCode + phoneNumber;
            
            startBtn.textContent = '⏳ Sending...';
            startBtn.disabled = true;
            showStatus('Sending SMS to ' + fullNumber + '...', 'success');
            
            // Simulate bombing (10 SMS with delay)
            let count = 0;
            const maxSMS = 10;
            
            const interval = setInterval(() => {
                count++;
                showStatus(`SMS ${count}/${maxSMS} sent: "${message.substring(0, 20)}..."`, 'success');
                
                if (count >= maxSMS) {
                    clearInterval(interval);
                    startBtn.textContent = '✅ BOMBER COMPLETE';
                    startBtn.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
                    setTimeout(() => {
                        startBtn.textContent = '🚀 START AGAIN';
                        startBtn.style.background = '';
                        startBtn.disabled = false;
                        form.reset();
                        hideStatus();
                    }, 3000);
                }
            }, 1000);
        });

        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = `status ${type}`;
            statusMsg.style.display = 'block';
        }

        function hideStatus() {
            statusMsg.style.display = 'none';
        }

        // Show warning on load
        window.onload = () => {
            document.getElementById('warningMsg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('warningMsg').style.display = 'none';
            }, 5000);
        };
    </script>
</body>
</html>
