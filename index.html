<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Habit Tracker - Dark Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b1021;
            --panel-bg: #151c33;
            --text-main: #ffffff;
            --text-muted: #8b95b1;
            --accent-blue: #00d2ff;
            --accent-green: #00e676;
            --accent-pink: #ff4081;
            --border-color: #2a3556;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        .top-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-box h3 {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }

        .tracker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .tracker-header input {
            background: transparent;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            width: 250px;
        }

        .tracker-header button {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .tracker-header button:hover {
            background: #00b8e6;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 4px;
            text-align: center;
            min-width: 30px;
        }

        th {
            color: var(--text-muted);
            font-weight: normal;
        }

        .habit-name {
            text-align: left;
            min-width: 150px;
            padding-left: 10px;
            color: var(--text-main);
            font-weight: 500;
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none;
            background-color: transparent;
            border: 1px solid var(--text-muted);
            width: 16px;
            height: 16px;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="checkbox"]:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .progress-cell {
            min-width: 80px;
            color: var(--accent-blue);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="top-section">
            <div class="panel stats-grid">
                <div class="stat-box">
                    <h3>Completed</h3>
                    <div class="value" id="totalCompleted">0</div>
                </div>
                <div class="stat-box">
                    <h3>Remaining</h3>
                    <div class="value" style="color: var(--accent-pink);" id="totalRemaining">0</div>
                </div>
                <div class="stat-box">
                    <h3>Daily Progress</h3>
                    <div class="value" style="color: var(--accent-green);" id="dailyAvg">0%</div>
                </div>
                <div class="stat-box">
                    <h3>Total Habits</h3>
                    <div class="value" id="totalHabitsStat">0</div>
                </div>
            </div>
            
            <div class="panel">
                <h3 style="color: var(--text-muted); margin-bottom: 10px; font-size: 14px; text-transform: uppercase;">Daily Progress Overview</h3>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="tracker-header">
                <h2 style="font-size: 18px; color: var(--text-main);">DAILY HABITS</h2>
                <div>
                    <input type="text" id="habitInput" placeholder="Enter new habit...">
                    <button onclick="addHabit()">Add Habit</button>
                </div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr id="tableHeader">
                            <th class="habit-name">Habit Name</th>
                            <th>Progress</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const daysInMonth = 31;
        let habits = JSON.parse(localStorage.getItem('ultimateHabits')) || [];
        let progressChartInstance = null;

        function init() {
            generateHeaders();
            renderHabits();
        }

        function generateHeaders() {
            const headerRow = document.getElementById('tableHeader');
            for (let i = 1; i <= daysInMonth; i++) {
                const th = document.createElement('th');
                th.innerText = i;
                headerRow.insertBefore(th, headerRow.children[i]);
            }
        }

        function renderHabits() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let totalCompletedTicks = 0;
            let dailyCompletionCounts = new Array(daysInMonth).fill(0);

            habits.forEach((habit, index) => {
                const tr = document.createElement('tr');
                let html = `<td class="habit-name">${habit.name}</td>`;
                
                let checkedCount = 0;
                for (let i = 0; i < daysInMonth; i++) {
                    const isChecked = habit.days[i] ? 'checked' : '';
                    if(habit.days[i]) {
                        checkedCount++;
                        totalCompletedTicks++;
                        dailyCompletionCounts[i]++;
                    }
                    html += `<td><input type="checkbox" ${isChecked} onchange="toggleDay(${index}, ${i})"></td>`;
                }

                const progressPercentage = Math.round((checkedCount / daysInMonth) * 100);
                
                html += `
                    <td class="progress-cell">${progressPercentage}%</td>
                    <td><button onclick="deleteHabit(${index})" style="background:transparent; border:none; color:var(--accent-pink); cursor:pointer;">✖</button></td>
                `;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            updateStats(totalCompletedTicks);
            updateChart(dailyCompletionCounts);
        }

        function updateStats(completedCount) {
            const totalPossible = habits.length * daysInMonth;
            const remaining = totalPossible > 0 ? totalPossible - completedCount : 0;
            const avg = totalPossible > 0 ? Math.round((completedCount / totalPossible) * 100) : 0;

            document.getElementById('totalCompleted').innerText = completedCount;
            document.getElementById('totalRemaining').innerText = remaining;
            document.getElementById('dailyAvg').innerText = avg + '%';
            document.getElementById('totalHabitsStat').innerText = habits.length;
        }

        function updateChart(dailyData) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);

            if (progressChartInstance) {
                progressChartInstance.destroy();
            }

            progressChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Habits Completed',
                        data: dailyData,
                        borderColor: '#00e676',
                        backgroundColor: 'rgba(0, 230, 118, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2,
                        pointBackgroundColor: '#00e676'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: habits.length > 0 ? habits.length : 1,
                            ticks: { color: '#8b95b1', stepSize: 1 },
                            grid: { color: 'rgba(42, 53, 86, 0.5)' }
                        },
                        x: { 
                            ticks: { color: '#8b95b1' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const habitName = input.value.trim();
            if (habitName !== '') {
                habits.push({ name: habitName, days: new Array(daysInMonth).fill(false) });
                input.value = '';
                saveAndRender();
            }
        }

        function toggleDay(habitIndex, dayIndex) {
            habits[habitIndex].days[dayIndex] = !habits[habitIndex].days[dayIndex];
            saveAndRender();
        }

        function deleteHabit(habitIndex) {
            habits.splice(habitIndex, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('ultimateHabits', JSON.stringify(habits));
            renderHabits();
        }

        init();
    </script>
</body>
</html>
