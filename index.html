<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullsto Clone - Temp Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [currentEmail, setCurrentEmail] = useState(null);
            const [emails, setEmails] = useState([]);
            const [loading, setLoading] = useState(false);
            const [customName, setCustomName] = useState('');
            const [socket, setSocket] = useState(null);

            // Socket.io Connection Logic
            useEffect(() => {
                const newSocket = io('http://localhost:4000');
                setSocket(newSocket);
                return () => newSocket.disconnect();
            }, []);

            useEffect(() => {
                if (currentEmail && socket) {
                    socket.emit('join_room', currentEmail);
                    socket.on('new_email', (data) => {
                        setEmails((prev) => [data, ...prev]);
                    });
                }
            }, [currentEmail, socket]);

            const generateEmail = async () => {
                setLoading(true);
                try {
                    const res = await fetch('http://localhost:4000/api/session/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customPrefix: customName }),
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        setCurrentEmail(data.email);
                        // Fetch history if any
                        const historyRes = await fetch(`http://localhost:4000/api/session/${data.email}`);
                        if(historyRes.ok) {
                            const historyData = await historyRes.json();
                            setEmails(historyData.emails || []);
                        }
                    } else {
                        alert(data.error || "Something went wrong");
                    }
                } catch (e) {
                    console.error("Error generating email:", e);
                }
                setLoading(false);
            };

            const copyToClipboard = () => {
                if(currentEmail) {
                    navigator.clipboard.writeText(currentEmail);
                    alert("Email copied to clipboard!");
                }
            };

            return (
                <div class="max-w-4xl mx-auto p-6">
                    {/* Hero Section */}
                    <div class="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-200 mb-8">
                        <h1 class="text-4xl font-bold mb-4">Temp Email Generator</h1>
                        <p class="text-gray-500 mb-8">Keep your real inbox clean and secure.</p>
                        
                        <div class="flex justify-center items-center gap-4 mb-6">
                            <input 
                                type="text" 
                                placeholder="Custom prefix (optional)" 
                                class="border p-3 rounded-lg w-64 focus:ring-2 focus:ring-blue-500 outline-none"
                                value={customName}
                                onChange={(e) => setCustomName(e.target.value)}
                            />
                            <button 
                                onClick={generateEmail} 
                                disabled={loading}
                                class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium flex items-center gap-2"
                            >
                                {loading ? "Generating..." : "Generate Email"}
                            </button>
                        </div>

                        {currentEmail && (
                            <div class="bg-blue-50 p-6 rounded-lg inline-block border border-blue-100">
                                <p class="text-sm text-blue-600 font-semibold mb-2">Your Temporary Email Address:</p>
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl font-bold">{currentEmail}</span>
                                    <button onClick={copyToClipboard} class="bg-white border p-2 rounded hover:bg-gray-50 transition text-sm font-medium">
                                        Copy
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Inbox Section */}
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="bg-gray-50 border-b p-4">
                            <h2 class="text-lg font-semibold">Inbox {emails.length > 0 && `(${emails.length})`}</h2>
                        </div>
                        <div class="p-0">
                            {emails.length === 0 ? (
                                <div class="text-center py-12 text-gray-500">
                                    <p>No emails yet. Waiting for incoming messages...</p>
                                    <div class="mt-4 animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
                                </div>
                            ) : (
                                <ul class="divide-y">
                                    {emails.map((email, idx) => (
                                        <li key={idx} class="p-4 hover:bg-gray-50 transition cursor-pointer">
                                            <div class="flex justify-between mb-1">
                                                <span class="font-bold">{email.from}</span>
                                                <span class="text-sm text-gray-500">{new Date(email.receivedAt).toLocaleTimeString()}</span>
                                            </div>
                                            <div class="font-semibold text-gray-800 mb-1">{email.subject}</div>
                                            <div class="text-sm text-gray-600 truncate">{email.textBody}</div>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
