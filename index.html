<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Habit Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f9f6;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #2c5e4f;
            margin-bottom: 20px;
        }
        .tracker-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .add-habit-section {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        input[type="text"] {
            padding: 10px;
            width: 250px;
            border: 1px solid #b8d8c8;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background-color: #7ab59a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #5c967b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #e0e0e0;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #e8f3ee;
            color: #4a7c68;
            font-size: 14px;
        }
        .habit-name {
            text-align: left;
            font-weight: bold;
            min-width: 150px;
            color: #333;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            height: 15px;
            margin-top: 5px;
        }
        .progress-bar {
            height: 100%;
            background-color: #7ab59a;
            width: 0%;
            transition: width 0.3s ease;
        }
        .delete-btn {
            background-color: #ff6b6b;
            padding: 5px 10px;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #ee5253;
        }
    </style>
</head>
<body>

    <h1>✨ The Ultimate Habit Tracker ✨</h1>
    
    <div class="tracker-container">
        <div class="add-habit-section">
            <input type="text" id="habitInput" placeholder="Nayi habit likho (e.g., Morning Run)...">
            <button onclick="addHabit()">Add Habit</button>
        </div>

        <table id="trackerTable">
            <thead>
                <tr id="tableHeader">
                    <th>Habit</th>
                    <th>Progress</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const daysInMonth = 31;
        let habits = JSON.parse(localStorage.getItem('myHabits')) || [];

        function init() {
            generateHeaders();
            renderHabits();
        }

        function generateHeaders() {
            const headerRow = document.getElementById('tableHeader');
            // Remove existing day headers if any
            while (headerRow.children.length > 3) {
                headerRow.removeChild(headerRow.children[1]);
            }
            // Add 1 to 31 columns
            for (let i = 1; i <= daysInMonth; i++) {
                const th = document.createElement('th');
                th.innerText = i;
                headerRow.insertBefore(th, headerRow.children[i]);
            }
        }

        function renderHabits() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            habits.forEach((habit, index) => {
                const tr = document.createElement('tr');
                
                // Habit Name
                let html = `<td class="habit-name">${habit.name}</td>`;
                
                // 31 Checkboxes
                let checkedCount = 0;
                for (let i = 0; i < daysInMonth; i++) {
                    const isChecked = habit.days[i] ? 'checked' : '';
                    if(habit.days[i]) checkedCount++;
                    html += `<td><input type="checkbox" ${isChecked} onchange="toggleDay(${index}, ${i})"></td>`;
                }

                // Progress Calculation
                const progressPercentage = Math.round((checkedCount / daysInMonth) * 100);
                
                html += `
                    <td>
                        <span>${progressPercentage}%</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${progressPercentage}%"></div>
                        </div>
                    </td>
                    <td><button class="delete-btn" onclick="deleteHabit(${index})">Delete</button></td>
                `;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const habitName = input.value.trim();
            if (habitName !== '') {
                habits.push({
                    name: habitName,
                    days: new Array(daysInMonth).fill(false)
                });
                input.value = '';
                saveAndRender();
            }
        }

        function toggleDay(habitIndex, dayIndex) {
            habits[habitIndex].days[dayIndex] = !habits[habitIndex].days[dayIndex];
            saveAndRender();
        }

        function deleteHabit(habitIndex) {
            habits.splice(habitIndex, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myHabits', JSON.stringify(habits));
            renderHabits();
        }

        // Initialize the app
        init();
    </script>

</body>
</html>
