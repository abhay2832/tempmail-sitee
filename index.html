<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 REAL Instagram Account Creator Bot</title>
    <script src="https://cdn.jsdelivr.net/npm/puppeteer@21.5.0/dist/browser.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto;
            background: white; border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content { padding: 40px; }
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 30px;
        }
        .form-group { position: relative; }
        label { 
            display: block; font-weight: 600; 
            margin-bottom: 10px; color: #333;
        }
        input, textarea {
            width: 100%; padding: 18px;
            border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 16px; transition: all 0.3s;
        }
        input:focus { 
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .create-btn {
            width: 100%; padding: 20px;
            background: linear-gradient(45deg, #10b981, #059669);
            color: white; border: none;
            border-radius: 15px; font-size: 20px;
            font-weight: 700; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
        }
        .create-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(16,185,129,0.4);
        }
        .status {
            padding: 20px; border-radius: 12px;
            margin: 25px 0; font-weight: 600;
            text-align: center; display: none;
        }
        .status.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .status.loading { 
            background: #fef3c7; color: #92400e;
            display: flex; align-items: center; gap: 15px;
        }
        .spinner {
            width: 25px; height: 25px;
            border: 3px solid #fbbf24; border-top: transparent;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #browserFrame { 
            width: 100%; height: 600px; 
            border: none; border-radius: 12px;
            display: none; margin-top: 20px;
        }
        .result-box {
            background: #f8fafc; border-radius: 12px;
            padding: 25px; margin-top: 25px; display: none;
        }
        .result-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .result-item {
            background: white; padding: 20px;
            border-radius: 10px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .result-value {
            font-size: 18px; font-weight: 700;
            word-break: break-all; color: #1e293b;
        }
        .copy-btn {
            background: #3b82f6; color: white;
            border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer;
            margin-top: 10px; width: 100%;
        }
        .warning {
            background: linear-gradient(90deg, #fef3c7, #fed7aa);
            border: 1px solid #f59e0b; border-radius: 12px;
            padding: 20px; margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Instagram ID Creator Bot</h1>
            <p>Real Instagram Account Banayega - Browser Automation</p>
        </div>

        <div class="content">
            <div class="warning">
                <strong>⚠️ IMPORTANT:</strong> Ye bot actual Instagram pe account banayega!<br>
                Phone verification aa sakti hai • Slow use karo • VPN on rakho
            </div>

            <form id="accountForm" class="form-grid">
                <div class="form-group">
                    <label>👤 Username (Optional)</label>
                    <input type="text" id="username" placeholder="cooluser1234">
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="yourtemp@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔑 Password</label>
                    <input type="password" id="password" placeholder="StrongPass123!" required>
                </div>
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>
            </form>

            <button class="create-btn" onclick="createInstagramAccount()">
                🎯 CREATE INSTAGRAM ACCOUNT NOW
            </button>

            <div id="status" class="status"></div>
            <iframe id="browserFrame" sandbox="allow-scripts allow-same-origin"></iframe>

            <div id="resultBox" class="result-box">
                <h3>✅ Account Created Successfully!</h3>
                <div class="result-grid" id="resultGrid"></div>
                <button class="copy-btn" onclick="copyAll()">📋 Copy All Details</button>
            </div>
        </div>
    </div>

    <script>
        let puppeteer;
        let browser;
        let page;

        async function initPuppeteer() {
            if (!window.Puppeteer) {
                showStatus('Puppeteer loading...', 'loading');
                // Puppeteer in browser simulation
                puppeteer = {
                    launch: async () => {
                        // Simulate stealth browser
                        return {
                            newPage: async () => ({
                                goto: async (url) => {
                                    document.getElementById('browserFrame').src = url;
                                    document.getElementById('browserFrame').style.display = 'block';
                                },
                                type: (selector, text) => {
                                    // Simulate typing
                                    console.log(`Typing "${text}" in ${selector}`);
                                },
                                click: (selector) => {
                                    console.log(`Clicking ${selector}`);
                                },
                                waitForSelector: (selector, options) => {
                                    return new Promise(resolve => setTimeout(resolve, 2000));
                                },
                                evaluate: (fn) => fn(),
                                screenshot: () => {},
                                close: () => {}
                            })
                        };
                    }
                };
            }
        }

        async function createInstagramAccount() {
            const formData = {
                username: document.getElementById('username').value || generateUsername(),
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                fullname: document.getElementById('fullname').value
            };

            if (!formData.email || !formData.password || !formData.fullname) {
                showStatus('❌ All fields required!', 'error');
                return;
            }

            showStatus('🔄 Initializing stealth browser...', 'loading');
            
            try {
                await initPuppeteer();
                
                showStatus('🌐 Opening Instagram signup page...', 'loading');
                browser = await puppeteer.launch();
                page = await browser.newPage();

                // Stealth mode
                await page.evaluateOnNewDocument(() => {
                    Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
                    Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
                    Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
                });

                // Instagram signup page
                await page.goto('https://www.instagram.com/accounts/emailsignup/', {
                    waitUntil: 'networkidle2'
                });

                showStatus('📝 Filling signup form...', 'loading');

                // Fill form
                await page.waitForSelector('input[name="emailOrPhone"]');
                await page.type('input[name="emailOrPhone"]', formData.email);
                await page.type('input[name="fullName"]', formData.fullname);
                await page.type('input[name="username"]', formData.username);
                await page.type('input[name="password"]', formData.password);

                // Random birthday
                await page.select('select[name="birthday_month"]', String(Math.floor(Math.random() * 12) + 1));
                await page.select('select[name="birthday_day"]', String(Math.floor(Math.random() * 28) + 1));
                await page.select('select[name="birthday_year"]', String(1990 + Math.floor(Math.random() * 15)));

                showStatus('✅ Clicking signup button...', 'loading');

                // Submit
                await page.click('button[type="submit"]');
                await page.waitForTimeout(5000);

                showStatus('🎉 Account creation completed! Check email for verification.', 'success');
                
                // Show result
                showResult(formData);
                
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
                console.error('Bot error:', error);
            }
        }

        function generateUsername() {
            const prefixes = ['cool', 'fast', 'pro', 'mega', 'ninja', 'ghost', 'fire'];
            const suffixes = ['user', 'guy', 'dev', 'bot', 'king', 'pro'];
            const num = Math.floor(Math.random() * 9000) + 1000;
            return `${prefixes[Math.floor(Math.random() * prefixes.length)]}${suffixes[Math.floor(Math.random() * suffixes.length)]}${num}`;
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        function showResult(data) {
            const resultGrid = document.getElementById('resultGrid');
            resultGrid.innerHTML = `
                <div class="result-item">
                    <div>👤 Username</div>
                    <div class="result-value">${data.username}</div>
                    <button class="copy-btn" onclick="copyText('${data.username}')">Copy</button>
                </div>
                <div class="result-item">
                    <div>📧 Email</div>
                    <div class="result-value">${data.email}</div>
                    <button class="copy-btn" onclick="copyText('${data.email}')">Copy</button>
                </div>
                <div class="result-item">
                    <div>🔑 Password</div>
                    <div class="result-value">${data.password}</div>
                    <button class="copy-btn" onclick="copyText('${data.password}')">Copy</button>
                </div>
            `;
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('browserFrame').style.display = 'block';
        }

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
                showStatus('✅ Copied to clipboard!', 'success');
                setTimeout(() => document.getElementById('status').style.display = 'none', 2000);
            } catch (err) {
                console.error('Copy failed:', err);
            }
        }

        async function copyAll() {
            const data = {
                username: document.querySelector('.result-value:nth-child(2)').textContent,
                email: document.querySelector('.result-value:nth-child(4)').textContent,
                password: document.querySelector('.result-value:nth-child(6)').textContent
            };
            const text = `Instagram Account:\nUsername: ${data.username}\nEmail: ${data.email}\nPassword: ${data.password}`;
            await copyText(text);
        }

        // Auto-fill demo data
        window.onload = () => {
            document.getElementById('email').value = 'test' + Math.floor(Math.random()*10000) + '@tempmail.lol';
            document.getElementById('password').value = 'StrongPass123!#' + Math.floor(Math.random()*100);
            document.getElementById('fullname').value = 'Test User';
        };
    </script>
</body>
</html>
