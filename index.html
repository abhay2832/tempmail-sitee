<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Mail Pro</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  background: #1e293b;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  text-align: center;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.inbox-item {
  background: #334155;
  padding: 10px;
  border-radius: 6px;
  margin-top: 10px;
  font-size: 14px;
}

</style></head><body><header>📧 Temp Mail Pro</header><div class="container"><div class="box">
<input type="text" id="email" placeholder="Generate email" readonly>
<button onclick="generateEmail()">Generate Email</button>
<button onclick="copyEmail()">Copy Email</button>
</div><div class="box">
<h3>Inbox</h3>
<div id="inbox"><p>No messages yet...</p></div>
<button onclick="refreshInbox()">Refresh Inbox</button>
</div></div><script>
let currentEmail = "";
let inbox = [];

// realistic names
const firstNames = ["rahul","aman","rohit","vikas","manav","arjun","deepak","karan"];
const lastNames = ["sharma","verma","singh","yadav","kumar","gupta","rajput"];
const domains = ["mailboxpro.net","inboxhub.net","fastmailbox.org","securemailhub.net"];

function generateEmail() {
  let first = firstNames[Math.floor(Math.random()*firstNames.length)];
  let last = lastNames[Math.floor(Math.random()*lastNames.length)];
  let number = Math.floor(Math.random()*9999);

  let domain = domains[Math.floor(Math.random()*domains.length)];

  currentEmail = first + "." + last + number + "@" + domain;

  document.getElementById("email").value = currentEmail;

  inbox = [];
  updateInbox();
}

function copyEmail() {
  let input = document.getElementById("email");
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}

function updateInbox() {
  let box = document.getElementById("inbox");

  if (inbox.length === 0) {
    box.innerHTML = "<p>No messages yet...</p>";
    return;
  }

  box.innerHTML = inbox.map(msg => `
    <div class="inbox-item">
      <b>${msg.title}</b><br>${msg.body}
    </div>
  `).join("");
}

function refreshInbox() {
  if (!currentEmail) {
    alert("Generate email first!");
    return;
  }

  let msgs = [
    {title:"OTP", body:"Your OTP is " + Math.floor(100000 + Math.random()*900000)},
    {title:"Welcome", body:"Welcome to our platform"},
    {title:"Security Alert", body:"New login detected"},
    {title:"Verification", body:"Verify your email now"}
  ];

  let msg = msgs[Math.floor(Math.random()*msgs.length)];

  inbox.unshift(msg);
  updateInbox();
}
</script></body>
</html>
