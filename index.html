<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator (Img2Img)</title>
    <style>
        /* --- CSS STYLES --- */
        
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #8e44ad;
            --accent-hover: #9b59b6;
            --border-color: #333;
            --input-bg: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: var(--input-bg);
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* Image Preview */
        #imagePreview {
            display: none;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid var(--accent-color);
            object-fit: cover;
        }

        /* Text Input */
        textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            resize: vertical;
            min-height: 80px;
            font-size: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Button */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        .generate-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .loader-container {
            display: none; /* Hidden by default */
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Area */
        .result-container {
            margin-top: 25px;
            text-align: center;
            display: none; /* Hidden by default */
            animation: fadeIn 0.5s ease;
        }

        .result-container img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .status-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Error Message */
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Image Generator</h1>

        <!-- 1. Upload Image Section -->
        <div class="input-group">
            <label>1. Upload Image</label>
            <div class="file-upload-wrapper">
                <div class="upload-icon">📁</div>
                <span id="uploadText">Click or Drag to Upload Image</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <!-- 4. Image Preview -->
            <img id="imagePreview" alt="Image Preview">
        </div>

        <!-- 2. Prompt Section -->
        <div class="input-group">
            <label>2. Describe changes (Prompt)</label>
            <textarea id="promptInput" placeholder="Enter your prompt here...">ultra realistic cinematic photo, 4k, DSLR, natural lighting, high detail, sharp focus</textarea>
        </div>

        <!-- 3. Generate Button -->
        <button id="generateBtn" class="generate-btn">Generate Image</button>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- 5. Loading Spinner -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p class="status-text" id="statusText">Initializing...</p>
        </div>

        <!-- 6. Result Display -->
        <div id="resultContainer" class="result-container">
            <label>Generated Result:</label>
            <img id="generatedImage" src="" alt="Generated AI Image">
            <br>
            <a id="downloadLink" href="#" download="ai-generated.png" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display:inline-block;">Download Image</a>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const generatedImage = document.getElementById('generatedImage');
        const errorMsg = document.getElementById('errorMsg');
        const downloadLink = document.getElementById('downloadLink');

        // Configuration - REPLACE THESE WITH YOUR ACTUAL DATA
        const API_TOKEN = 'YOUR_API_KEY_HERE'; // Your Replicate API Token
        const MODEL_VERSION = 'YOUR_MODEL_VERSION_ID'; // e.g., a stable diffusion img2img version hash
        
        let uploadedBase64 = null; // Store converted image here

        // 1. Handle Image Upload & Preview
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadText.textContent = file.name;
                
                // Convert file to Base64
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedBase64 = event.target.result;
                    imagePreview.src = uploadedBase64;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Handle Generate Button Click
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value;

            // Basic Validation
            if (!uploadedBase64) {
                showError("Please upload an image first.");
                return;
            }
            if (!prompt.trim()) {
                showError("Please enter a prompt.");
                return;
            }
            if (API_TOKEN === 'YOUR_API_KEY_HERE' || MODEL_VERSION === 'YOUR_MODEL_VERSION_ID') {
                showError("Please configure your API Key and Model Version in the code.");
                return;
            }

            // Reset UI
            hideError();
            resultContainer.style.display = 'none';
            loader.style.display = 'block';
            generateBtn.disabled = true;
            statusText.textContent = "Sending request to AI...";

            try {
                // 3. Call API
                await createPrediction(prompt, uploadedBase64);
            } catch (err) {
                showError(err.message);
                loader.style.display = 'none';
                generateBtn.disabled = false;
            }
        });

        async function createPrediction(prompt, base64Image) {
            // Remove the data:image/jpeg;base64, prefix to just keep the base64 string
            const cleanBase64 = base64Image.split(',')[1];

            // Initial POST request
            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${API_TOKEN}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    version: MODEL_VERSION, // The specific model version hash
                    input: {
                        prompt: prompt,
                        image: cleanBase64 // Sending base64 directly
                    }
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'API Request Failed');
            }

            const prediction = await response.json();
            
            // Replicate returns a URL to check status. We must poll it.
            if (prediction.status === 'succeeded') {
                displayResult(prediction.output);
            } else if (prediction.status === 'failed') {
                throw new Error('Generation failed on the server.');
            } else {
                // Start polling
                pollForResult(prediction.urls.get);
            }
        }

        async function pollForResult(getUrl) {
            const maxAttempts = 60; // Prevent infinite loops
            let attempts = 0;

            const interval = setInterval(async () => {
                attempts++;
                
                // Check status
                const response = await fetch(getUrl, {
                    headers: { 'Authorization': `Token ${API_TOKEN}` }
                });
                
                if (!response.ok) {
                    clearInterval(interval);
                    throw new Error("Error checking status.");
                }

                const prediction = await response.json();

                if (prediction.status === 'succeeded') {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    displayResult(prediction.output);
                    generateBtn.disabled = false;
                } else if (prediction.status === 'failed') {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    throw new Error("Image generation failed.");
                } else {
                    // Still processing
                    statusText.textContent = `Processing... ${Math.round((attempts / maxAttempts) * 100)}%`;
                    
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        loader.style.display = 'none';
                        throw new Error("Timed out waiting for image.");
                    }
                }
            }, 2000); // Check every 2 seconds
        }

        function displayResult(output) {
            // Depending on the model, output might be a single string or an array
            let imageUrl = Array.isArray(output) ? output[0] : output;
            
            generatedImage.src = imageUrl;
            downloadLink.href = imageUrl;
            resultContainer.style.display = 'block';
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }
    </script>
</body>
</html>
