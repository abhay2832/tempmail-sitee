<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Mail Pro</title><style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: #fff;
}

header {
  text-align: center;
  padding: 15px;
  background: #1e293b;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  text-align: center;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
}

.inbox-item {
  background: #334155;
  padding: 10px;
  border-radius: 6px;
  margin-top: 10px;
  font-size: 14px;
}

.footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  margin-top: 20px;
}
</style></head><body><header>📧 Temp Mail Pro</header><div class="container">  <div class="box">
    <input type="text" id="email" placeholder="Click Generate Email" readonly>
    <button onclick="generateEmail()">Generate Email</button>
    <button onclick="copyEmail()">Copy Email</button>
  </div>  <div class="box">
    <h3>Inbox</h3>
    <div id="inbox">
      <p>No messages yet...</p>
    </div>
    <button onclick="refreshInbox()">Refresh Inbox</button>
  </div>  <div class="footer">
    Simple Temp Mail Demo • GitHub Ready
  </div></div><script>
let currentEmail = "";
let inboxMessages = [];

function generateEmail() {
  const random = Math.random().toString(36).substring(2, 10);
  const domains = ["tempmail.xyz", "mailboxy.site", "quickmail.pro"];
  const domain = domains[Math.floor(Math.random() * domains.length)];

  currentEmail = random + "@" + domain;
  document.getElementById("email").value = currentEmail;

  inboxMessages = [];
  updateInbox();
}

function copyEmail() {
  const emailField = document.getElementById("email");
  emailField.select();
  emailField.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("Email copied!");
}

function updateInbox() {
  const inbox = document.getElementById("inbox");

  if (inboxMessages.length === 0) {
    inbox.innerHTML = "<p>No messages yet...</p>";
    return;
  }

  inbox.innerHTML = inboxMessages.map(msg => `
    <div class="inbox-item">
      <b>${msg.title}</b><br>
      ${msg.body}
    </div>
  `).join("");
}

function refreshInbox() {
  if (!currentEmail) {
    alert("Please generate email first!");
    return;
  }

  const demoMessages = [
    {title: "OTP Code", body: "Your OTP is: " + Math.floor(100000 + Math.random()*900000)},
    {title: "Welcome", body: "Thanks for signing up!"},
    {title: "Security Alert", body: "New login detected."},
    {title: "Verification", body: "Click link to verify account."}
  ];

  const randomMsg = demoMessages[Math.floor(Math.random() * demoMessages.length)];
  inboxMessages.unshift(randomMsg);

  updateInbox();
}
</script></body>
</html>bodyDiv.innerText
