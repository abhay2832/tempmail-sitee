<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator (Img2Img)</title>
    <style>
        /* --- CSS STYLES --- */
        
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #8e44ad;
            --accent-hover: #9b59b6;
            --border-color: #333;
            --input-bg: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Section styling */
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: var(--input-bg);
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-color);
        }

        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* Image Preview */
        #imagePreview {
            display: none;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            border: 2px solid var(--accent-color);
            object-fit: cover;
        }

        /* Button */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        .generate-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .loader-container {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Area */
        .result-container {
            margin-top: 25px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-container img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .status-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Error Message */
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
        }

        /* Success Message */
        .success-msg {
            color: #2ecc71;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 8px;
        }

        /* Download Button */
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Help text */
        .help-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .help-link {
            color: var(--accent-color);
            text-decoration: none;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 520px) {
            .container {
                padding: 20px;
                margin-top: 10px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .upload-icon {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Image Generator</h1>

        <!-- API Configuration Section -->
        <div class="section">
            <h2>⚙️ API Configuration</h2>
            
            <div class="input-group">
                <label for="apiToken">Replicate API Token</label>
                <input type="password" id="apiToken" placeholder="Enter your Replicate API Token">
                <p class="help-text">Get your token from <a href="https://replicate.com/account/api-tokens" target="_blank" class="help-link">replicate.com/account/api-tokens</a></p>
            </div>
            
            <div class="input-group">
                <label for="modelVersion">Model Version ID</label>
                <input type="text" id="modelVersion" placeholder="e.g., 39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b">
                <p class="help-text">Use: <strong>stability-ai/stable-diffusion:...</strong> (Image-to-Image model)</p>
            </div>
        </div>

        <!-- Image Upload Section -->
        <div class="section">
            <h2>📷 Upload Image</h2>
            <div class="file-upload-wrapper">
                <div class="upload-icon">📁</div>
                <span id="uploadText">Click or Drag to Upload Image</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <img id="imagePreview" alt="Image Preview">
        </div>

        <!-- Prompt Section -->
        <div class="section">
            <h2>✨ Describe Your Vision</h2>
            <div class="input-group">
                <label for="promptInput">Prompt</label>
                <textarea id="promptInput" placeholder="Describe the changes you want...">ultra realistic cinematic action scene, 4k, DSLR, golden hour lighting, dramatic shadows, high detail face, realistic skin texture, professional photography, shallow depth of field</textarea>
            </div>
        </div>

        <!-- Generate Button -->
        <button id="generateBtn" class="generate-btn">Generate Image</button>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- Success Message -->
        <div id="successMsg" class="success-msg"></div>

        <!-- Loading Spinner -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p class="status-text" id="statusText">Initializing...</p>
        </div>

        <!-- Result Display -->
        <div id="resultContainer" class="result-container">
            <h2>🎨 Generated Result</h2>
            <img id="generatedImage" src="" alt="Generated AI Image">
            <br>
            <a id="downloadLink" href="#" download="ai-generated-image.png" class="download-btn">Download Image</a>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadText = document.getElementById('uploadText');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const generatedImage = document.getElementById('generatedImage');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const downloadLink = document.getElementById('downloadLink');
        const apiTokenInput = document.getElementById('apiToken');
        const modelVersionInput = document.getElementById('modelVersion');

        let uploadedBase64 = null; // Store converted image here

        // 1. Handle Image Upload & Preview
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadText.textContent = file.name;
                
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    showError('Please upload a valid image file.');
                    return;
                }
                
                // Convert file to Base64
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedBase64 = event.target.result;
                    imagePreview.src = uploadedBase64;
                    imagePreview.style.display = 'block';
                    hideError();
                };
                reader.onerror = function() {
                    showError('Error reading file. Please try again.');
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Handle Generate Button Click
        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            const apiToken = apiTokenInput.value.trim();
            const modelVersion = modelVersionInput.value.trim();

            // Basic Validation
            if (!apiToken) {
                showError('Please enter your Replicate API Token.');
                apiTokenInput.focus();
                return;
            }
            
            if (!modelVersion) {
                showError('Please enter the Model Version ID.');
                modelVersionInput.focus();
                return;
            }
            
            if (!uploadedBase64) {
                showError('Please upload an image first.');
                return;
            }
            
            if (!prompt) {
                showError('Please enter a prompt describing your vision.');
                promptInput.focus();
                return;
            }

            // Reset UI
            hideError();
            successMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            loader.style.display = 'block';
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';
            statusText.textContent = 'Connecting to AI server...';

            try {
                // 3. Call API
                await createPrediction(prompt, uploadedBase64, apiToken, modelVersion);
            } catch (err) {
                showError(err.message);
                loader.style.display = 'none';
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Image';
            }
        });

        // 4. Create Prediction (Send request to API)
        async function createPrediction(prompt, base64Image, apiToken, modelVersion) {
            // Remove the data:image/jpeg;base64, prefix to just keep the base64 string
            const cleanBase64 = base64Image.split(',')[1];

            statusText.textContent = 'Sending request to API...';

            // Initial POST request to Replicate API
            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${apiToken}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    version: modelVersion,
                    input: {
                        prompt: prompt,
                        image: cleanBase64
                    }
                })
            });

            // Handle API errors
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.detail || `API Request Failed (Status: ${response.status})`);
            }

            const prediction = await response.json();
            
            statusText.textContent = 'AI is processing your image...';

            // Replicate returns a URL to check status. We must poll it.
            if (prediction.status === 'succeeded') {
                displayResult(prediction.output);
            } else if (prediction.status === 'failed') {
                throw new Error('Generation failed on the server. Please try again.');
            } else {
                // Start polling for results
                pollForResult(prediction.urls.get, apiToken);
            }
        }

        // 5. Poll for results (Replicate API works asynchronously)
        async function pollForResult(getUrl, apiToken) {
            const maxAttempts = 90; // Maximum polling attempts (about 3 minutes)
            let attempts = 0;

            const interval = setInterval(async () => {
                attempts++;
                
                // Check status
                const response = await fetch(getUrl, {
                    headers: { 'Authorization': `Token ${apiToken}` }
                });
                
                if (!response.ok) {
                    clearInterval(interval);
                    throw new Error('Error checking generation status.');
                }

                const prediction = await response.json();

                if (prediction.status === 'succeeded') {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    displayResult(prediction.output);
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate Image';
                    
                    // Show success message
                    successMsg.textContent = '✨ Image generated successfully!';
                    successMsg.style.display = 'block';
                    
                } else if (prediction.status === 'failed') {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate Image';
                    throw new Error('Image generation failed. Please try again.');
                } else {
                    // Still processing - update status
                    const progress = Math.min(Math.round((attempts / maxAttempts) * 100), 100);
                    statusText.textContent = `Processing... ${progress}%`;
                    
                    // Timeout protection
                    if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        loader.style.display = 'none';
                        generateBtn.disabled = false;
                        generateBtn.textContent = 'Generate Image';
                        throw new Error('Timed out waiting for image generation. The server may be busy.');
                    }
                }
            }, 2000); // Check every 2 seconds
        }

        // 6. Display the generated image
        function displayResult(output) {
            // Depending on the model, output might be a single string or an array
            let imageUrl = Array.isArray(output) ? output[0] : output;
            
            generatedImage.src = imageUrl;
            downloadLink.href = imageUrl;
            resultContainer.style.display = 'block';
            
            // Scroll to result
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Helper function to show error messages
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        // Helper function to hide error messages
        function hideError() {
            errorMsg.style.display = 'none';
        }

        // Save API credentials to localStorage for convenience
        function saveCredentials() {
            localStorage.setItem('replicate_api_token', apiTokenInput.value);
            localStorage.setItem('replicate_model_version', modelVersionInput.value);
        }

        // Load saved credentials on page load
        function loadCredentials() {
            const savedToken = localStorage.getItem('replicate_api_token');
            const savedVersion = localStorage.getItem('replicate_model_version');
            
            if (savedToken) apiTokenInput.value = savedToken;
            if (savedVersion) modelVersionInput.value = savedVersion;
        }

        // Auto-save credentials when they change
        apiTokenInput.addEventListener('change', saveCredentials);
        modelVersionInput.addEventListener('change', saveCredentials);

        // Load credentials on startup
        loadCredentials();
    </script>
</body>
</html>
