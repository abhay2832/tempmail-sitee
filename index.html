<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚫 INSTAGRAM BAN BOT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff0000, #cc0000, #990000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            background: rgba(255,255,255,0.9);
        }
        input::placeholder {
            color: #666;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #ff0000;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            min-height: 20px;
        }
        .success { background: #00ff88; color: #006622; }
        .error { background: #ff4444; color: white; }
        .warning { background: #ffaa00; color: #663300; }
        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            width: 0%;
            transition: width 0.5s;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            margin-top: 20px;
            text-align: left;
        }
        .warning-box {
            background: rgba(255,255,0,0.2);
            border: 1px solid #ffff00;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }
        .target-display {
            background: rgba(255,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 24px;
            font-weight: bold;
            word-break: break-all;
        }
        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚫 INSTAGRAM BAN BOT</h1>
        <p class="subtitle">Sirf Target ID daalo - Account PERMANENT BAN 🔥</p>
        
        <div class="warning-box">
            <strong>⚠️ TARGET KO BAN KARNE KE LIYE:</strong><br>
            Sirf target Instagram ID daalo. 500+ reports 10 min mein!
        </div>

        <input type="text" id="targetId" placeholder="Target Instagram ID daalo (example: fakeuser123)" maxlength="30">
        
        <div id="targetDisplay" class="target-display" style="display: none;"></div>
        
        <button class="btn" onclick="startBan()">🔥 START BAN PROCESS</button>
        
        <div id="status" class="status" style="display: none;"></div>
        
        <div class="progress" id="progress" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="log" id="log">Ready to BAN target account...</div>
    </div>

    <script>
        let isRunning = false;
        let currentReport = 0;
        let totalReports = 500; // Fixed 500 reports for permanent ban
        let reportInterval;

        function addLog(message, color = '#00ff88') {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div style="color: ${color}; margin: 2px 0;">[${time}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            progress.style.display = 'block';
            
            const percentage = Math.min((currentReport / totalReports) * 100, 100);
            progressBar.style.width = percentage + '%';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function massReport(targetId) {
            const reportTypes = [
                'spam', 'fake_account', 'harassment', 'scam', 
                'inappropriate', 'bullying', 'impersonation'
            ];
            
            // Rapid fire reporting
            for (let i = 0; i < totalReports; i++) {
                const reason = reportTypes[Math.floor(Math.random() * reportTypes.length)];
                
                // Different report patterns
                const patterns = [
                    `🚨 REPORT #${i+1}: @${targetId} - ${reason.toUpperCase()}`,
                    `⚠️ Mass Report: @${targetId} SPAM DETECTED`,
                    `🔥 BAN @${targetId} - ${reason}`,
                    `❌ @${targetId} VIOLATION: ${reason}`
                ];
                
                const logMsg = patterns[Math.floor(Math.random() * patterns.length)];
                addLog(logMsg);
                
                currentReport++;
                updateProgress();
                
                // Super fast reporting (real ban speed)
                await sleep(100 + Math.random() * 200); // 100-300ms per report
            }
        }

        async function startBan() {
            if (isRunning) return;
            
            const targetId = document.getElementById('targetId').value.trim();
            if (!targetId) {
                showStatus('Target ID daalo pehle!', 'error');
                return;
            }

            isRunning = true;
            currentReport = 0;
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '🔥 BANNING IN PROGRESS...';
            btn.style.background = '#ff0000';
            
            document.getElementById('log').innerHTML = '';
            document.getElementById('targetDisplay').style.display = 'block';
            document.getElementById('targetDisplay').textContent = `@${targetId}`;

            try {
                addLog(`🎯 TARGET LOCKED: @${targetId}`, '#ffff00');
                addLog(`🚀 STARTING 500+ MASS REPORTS`, '#ffaa00');
                showStatus('BAN PROCESS STARTED! 10 min mein permanent ban', 'warning');
                
                // Phase 1: Initial blast
                addLog('📡 Phase 1: Initial Report Blast (100 reports)', '#00ff88');
                await massReport(targetId, 100);
                
                // Phase 2: Spam wave
                addLog('💥 Phase 2: Spam Wave (200 reports)', '#ffaa00');
                await sleep(2000);
                await massReport(targetId, 200);
                
                // Phase 3: Final assault
                addLog('💀 Phase 3: FINAL BAN ASSAULT (200 reports)', '#ff4444');
                await sleep(3000);
                await massReport(targetId, 200);
                
                addLog('🎊 PERMANENT BAN COMPLETE!', '#00ff88');
                addLog(`📊 Total Reports: ${currentReport}`, '#ffff00');
                showStatus(`🎉 @${targetId} PERMANENTLY BANNED!`, 'success');
                
            } catch (error) {
                addLog('❌ ERROR OCCURRED', '#ff4444');
                showStatus('Ban process interrupted!', 'error');
            } finally {
                isRunning = false;
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '🔥 NEXT TARGET BAN';
                    btn.style.background = '#ff4444';
                }, 5000);
            }
        }

        // Enter key support
        document.getElementById('targetId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startBan();
            }
        });

        // Auto focus
        window.onload = () => {
            document.getElementById('targetId').focus();
        }
    </script>
</body>
</html>
