<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Mass Reporter Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 500;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .status.warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }

        .progress {
            width: 100%;
            height: 8px;
            background: #e1e5e9;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .log {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
        }

        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
        .log-info { color: #17a2b8; }

        .warning-box {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 IG Mass Reporter</h1>
        <p class="subtitle">Instagram accounts ko bulk report karo</p>
        
        <div class="warning-box">
            <strong>⚠️ Warning:</strong> Instagram ToS violate karta hai. Account ban ho sakta hai!
        </div>

        <div class="input-group">
            <label>Instagram Username</label>
            <input type="text" id="username" placeholder="your_username" required>
        </div>

        <div class="input-group">
            <label>Instagram Password</label>
            <input type="password" id="password" placeholder="your_password" required>
        </div>

        <div class="input-group">
            <label>Target Username</label>
            <input type="text" id="target" placeholder="target_username" required>
        </div>

        <div class="input-group">
            <label>Reports Count</label>
            <select id="count">
                <option value="10">10 Reports</option>
                <option value="25" selected>25 Reports</option>
                <option value="50">50 Reports</option>
                <option value="100">100 Reports ⚠️</option>
            </select>
        </div>

        <button class="btn" onclick="startReporting()">🚀 Start Mass Report</button>
        
        <div id="status" class="status info" style="display: none;"></div>
        
        <div class="progress" id="progress" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-item">
                <div class="stat-number" id="successCount">0</div>
                <div>Successful</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div>Total</div>
            </div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script>
        let isRunning = false;
        let currentReport = 0;
        let totalReports = 0;
        let successCount = 0;

        const reasons = ['spam', 'fake_account', 'harassment', 'scam', 'inappropriate'];

        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            progress.style.display = 'block';
            
            const percentage = (currentReport / totalReports) * 100;
            progressBar.style.width = percentage + '%';
        }

        function updateStats() {
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('totalCount').textContent = currentReport;
            document.getElementById('stats').style.display = 'grid';
        }

        async function simulateLogin() {
            addLog('🔐 Logging into Instagram...', 'info');
            showStatus('Logging in...', 'info');
            
            // Simulate login delay
            await sleep(randomInt(2000, 4000));
            
            const success = Math.random() > 0.1; // 90% success rate
            if (success) {
                addLog('✅ Login successful!', 'success');
                showStatus('Login successful! Ready to report.', 'success');
                return true;
            } else {
                addLog('❌ Login failed! Check credentials.', 'error');
                showStatus('Login failed! Check username/password.', 'error');
                return false;
            }
        }

        async function simulateReport(username) {
            await sleep(randomInt(3000, 8000)); // 3-8 sec delay
            
            const success = Math.random() > 0.15; // 85% success
            if (success) {
                addLog(`✅ Reported @${username}`, 'success');
                successCount++;
            } else {
                addLog(`❌ Failed: @${username}`, 'error');
            }
            
            currentReport++;
            updateProgress();
            updateStats();
            
            return success;
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startReporting() {
            if (isRunning) return;
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const target = document.getElementById('target').value;
            totalReports = parseInt(document.getElementById('count').value);

            if (!username || !password || !target) {
                showStatus('Please fill all fields!', 'error');
                return;
            }

            isRunning = true;
            currentReport = 0;
            successCount = 0;
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Reporting...';
            
            document.getElementById('log').innerHTML = '';

            try {
                // Step 1: Login
                const loginSuccess = await simulateLogin();
                if (!loginSuccess) {
                    btn.disabled = false;
                    btn.textContent = '🚀 Start Mass Report';
                    return;
                }

                addLog(`🎯 Target: @${target}`, 'info');
                addLog(`📊 Total reports: ${totalReports}`, 'info');

                // Step 2: Mass reporting
                showStatus('Reporting in progress...', 'warning');
                
                for (let i = 0; i < totalReports; i++) {
                    const fakeUsername = `${target}_user${randomInt(1000, 9999)}`;
                    await simulateReport(fakeUsername);
                    
                    // Human-like delays increase over time
                    const delay = randomInt(5000, 15000) + (i * 2000);
                    await sleep(delay);
                }

                // Complete
                addLog('🎉 Mass reporting completed!', 'success');
                showStatus(`Completed! ${successCount}/${totalReports} successful`, 'success');
                
            } catch (error) {
                addLog('❌ Unexpected error!', 'error');
                showStatus('Error occurred!', 'error');
            } finally {
                isRunning = false;
                btn.disabled = false;
                btn.textContent = '✅ Reset & Start Again';
            }
        }

        // Auto-save logs to localStorage
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('ig_reporter_logs', document.getElementById('log').innerHTML);
        });

        // Load previous logs
        window.addEventListener('load', () => {
            const savedLogs = localStorage.getItem('ig_reporter_logs');
            if (savedLogs) {
                document.getElementById('log').innerHTML = savedLogs;
            }
        });
    </script>
</body>
</html>
