<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail Pro - Free Disposable Email</title>
    <meta name="description" content="Free temporary disposable email service. Protect your real inbox from spam!">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .email-glow { box-shadow: 0 0 30px rgba(102, 126, 234, 0.4); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); } 50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); } }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-bg min-h-screen text-white">
    
    <!-- Header -->
    <nav class="backdrop-blur-md bg-white/10 sticky top-0 z-50 border-b border-white/20">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-sm">
                    <i class="fa-solid fa-envelope text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">TempMail Pro</h1>
                    <p class="text-xs opacity-80">Disposable Email Service</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center hover:bg-white/30 transition-all">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <button onclick="generateNewEmail()" class="px-6 py-2 bg-white/20 backdrop-blur-sm rounded-xl font-semibold hover:bg-white/30 transition-all">
                    <i class="fa-solid fa-plus mr-2"></i>New
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-12">
        
        <!-- Email Generator -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl fade-in email-glow">
            <div class="text-center mb-8">
                <h2 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
                    Your Disposable Email
                </h2>
                <p class="text-xl opacity-90">Protect your real inbox from spam</p>
            </div>
            
            <div class="relative mb-8">
                <input id="email-display" type="text" readonly 
                       class="w-full text-center text-2xl md:text-3xl font-mono font-bold py-8 px-6 bg-white/20 backdrop-blur-xl rounded-2xl border-4 border-white/30 text-white focus:outline-none email-glow hover:border-white/50 transition-all duration-300"
                       value="Click 'New' to generate your email">
                <div id="loading-spinner" class="absolute right-4 top-1/2 -translate-y-1/2 hidden">
                    <i class="fa-solid fa-spinner fa-spin text-xl"></i>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 justify-center items-center mb-8">
                <button onclick="copyEmail()" class="px-8 py-4 bg-white/20 backdrop-blur-sm rounded-2xl font-semibold hover:bg-white/30 transition-all flex items-center gap-3 group">
                    <i class="fa-regular fa-copy group-hover:fa-solid"></i>
                    <span>Copy Email</span>
                </button>
                <button onclick="generateNewEmail()" class="px-8 py-4 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 rounded-2xl font-bold shadow-2xl hover:shadow-3xl transition-all flex items-center gap-3 pulse-glow">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span>New Email</span>
                </button>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center text-sm opacity-80">
                <div><i class="fa-solid fa-clock text-green-400 mb-1"></i><div>5 Min Active</div></div>
                <div><i class="fa-solid fa-lock text-blue-400 mb-1"></i><div>100% Private</div></div>
                <div><i class="fa-solid fa-inbox text-purple-400 mb-1"></i><div>Live Inbox</div></div>
                <div><i class="fa-solid fa-bolt text-yellow-400 mb-1"></i><div>Lightning Fast</div></div>
            </div>
        </div>

        <!-- Live Inbox -->
        <div class="mt-12 bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl fade-in">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-inbox text-2xl"></i>
                    Live Inbox
                </h3>
                <div class="flex items-center gap-4">
                    <button onclick="refreshInbox()" class="px-4 py-2 bg-white/20 rounded-xl hover:bg-white/30 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-arrows-rotate"></i>
                        Refresh
                    </button>
                    <div class="flex items-center gap-1 text-sm opacity-80">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        Live
                    </div>
                </div>
            </div>
            
            <div id="inbox-container" class="space-y-3 max-h-96 overflow-y-auto">
                <div class="text-center py-12 opacity-50">
                    <i class="fa-solid fa-inbox text-4xl mb-4"></i>
                    <p class="text-lg font-semibold">No emails yet</p>
                    <p class="text-sm">Send emails to your temporary address</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-12">
            <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 border border-white/20 text-center">
                <div class="text-3xl font-bold text-blue-300 mb-2" id="stat-emails">0</div>
                <div class="text-sm opacity-80">Emails Today</div>
            </div>
            <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 border border-white/20 text-center">
                <div class="text-3xl font-bold text-green-300 mb-2" id="stat-active">1</div>
                <div class="text-sm opacity-80">Active Inbox</div>
            </div>
            <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 border border-white/20 text-center">
                <div class="text-3xl font-bold text-purple-300 mb-2" id="stat-uptime">99.9%</div>
                <div class="text-sm opacity-80">Uptime</div>
            </div>
            <div class="bg-white/10 backdrop-blur-xl rounded-2xl p-6 border border-white/20 text-center">
                <div class="text-3xl font-bold text-yellow-300 mb-2" id="stat-speed">14ms</div>
                <div class="text-sm opacity-80">Response</div>
            </div>
        </div>
    </div>

    <!-- Email Modal -->
    <div id="email-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6">
        <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-2xl rounded-3xl max-w-4xl w-full max-h-[90vh] shadow-2xl border border-white/30 overflow-hidden">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-bold">Loading Email...</h3>
                <button onclick="closeEmailModal()" class="p-2 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <iframe id="email-frame" class="w-full h-96 md:h-[70vh] border-0 bg-white dark:bg-gray-900"></iframe>
        </div>
    </div>

    <script>
        // === CORE VARIABLES ===
        const API_BASE = 'https://api.mail.gw';
        let currentToken = '';
        let currentEmail = '';
        let messages = [];
        let autoRefreshInterval;

        // === MAIN FUNCTIONS ===
        async function generateNewEmail() {
            const emailDisplay = document.getElementById('email-display');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            emailDisplay.value = 'Generating secure email...';
            
            try {
                // Get available domain
                const domainRes = await fetch(`${API_BASE}/domains`);
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0]?.domain || 'guerrillamail.com';
                
                // Generate random username
                const username = 'temp' + Math.floor(10000 + Math.random() * 90000);
                const fullEmail = `${username}@${domain}`;
                const tempPassword = 'TempPass' + Math.random().toString(36).slice(-8);
                
                // Create account
                const accountRes = await fetch(`${API_BASE}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: fullEmail, password: tempPassword })
                });
                
                if (accountRes.ok) {
                    // Get token
                    const tokenRes = await fetch(`${API_BASE}/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ address: fullEmail, password: tempPassword })
                    });
                    
                    const tokenData = await tokenRes.json();
                    currentToken = tokenData.token;
                    currentEmail = fullEmail;
                    
                    // Update UI
                    emailDisplay.value = fullEmail;
                    spinner.classList.add('hidden');
                    
                    // Clear inbox & start monitoring
                    messages = [];
                    updateInbox();
                    startAutoRefresh();
                    
                    console.log('✅ New email generated:', fullEmail);
                }
            } catch (error) {
                emailDisplay.value = 'Error! Click New again';
                spinner.classList.add('hidden');
                console.error('Generate error:', error);
            }
        }

        async function refreshInbox() {
            if (!currentToken) return;
            
            try {
                const res = await fetch(`${API_BASE}/messages`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                messages = data['hydra:member'] || [];
                updateInbox();
            } catch (error) {
                console.error('Refresh error:', error);
            }
        }

        function updateInbox() {
            const container = document.getElementById('inbox-container');
            const emailCount = document.getElementById('stat-emails');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 opacity-50">
                        <i class="fa-solid fa-inbox text-5xl mb-6"></i>
                        <p class="text-xl font-semibold mb-2">No emails yet</p>
                        <p class="text-lg">Send test emails to your temporary address</p>
                    </div>
                `;
            } else {
                container.innerHTML = messages.map(msg => `
                    <div class="bg-white/20 backdrop-blur-sm rounded-2xl p-6 border border-white/30 hover:border-white/50 transition-all cursor-pointer group" onclick="openEmail('${msg.id}')">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-lg truncate mb-1 group-hover:text-blue-300 transition">${msg.subject || '(No Subject)'}</div>
                                <div class="text-sm opacity-80 truncate">${msg.from?.address || 'Unknown Sender'}</div>
                            </div>
                            <div class="text-right ml-4 flex-shrink-0">
                                <div class="text-xs opacity-70">${new Date(msg.createdAt).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            if (emailCount) emailCount.textContent = messages.length;
        }

        function openEmail(messageId) {
            const modal = document.getElementById('email-modal');
            const title = document.getElementById('modal-title');
            const frame = document.getElementById('email-frame');
            
            const message = messages.find(m => m.id === messageId);
            if (message) {
                title.textContent = message.subject || 'No Subject';
                frame.src = `${API_BASE}/messages/${messageId}/raw?Authorization=Bearer ${currentToken}`;
                modal.classList.remove('hidden');
            }
        }

        function closeEmailModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-frame').src = '';
        }

        function copyEmail() {
            const email = document.getElementById('email-display').value;
            navigator.clipboard.writeText(email).then(() => {
                // Visual feedback
                const input = document.getElementById('email-display');
                const original = input.style.background;
                input.style.background = '#10b981';
                setTimeout(() => input.style.background = original, 1000);
            });
        }

        function startAutoRefresh() {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(refreshInbox, 5000);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // === INIT ===
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-generate first email
            setTimeout(generateNewEmail, 1000);
            
            // Close modal on outside click
            document.getElementById('email-modal').addEventListener('click', function(e) {
                if (e.target === this) closeEmailModal();
            });
            
            console.log('🚀 TempMail Pro Ready!');
        });
    </script>
</body>
</html>
