<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-blue: #0ea5e9;
            --accent-purple: #8b5cf6;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        /* Sidebar Styles */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stats-box {
            text-align: center;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .stats-box h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stats-box .value {
            font-size: 28px;
            font-weight: bold;
        }

        .val-green { color: var(--accent-green); }
        .val-red { color: var(--accent-red); }

        /* Main Content Styles */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-widgets {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .circle-progress {
            text-align: center;
        }

        .circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid var(--border-color);
            border-top-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            margin: 0 auto 10px auto;
        }

        .chart-container {
            height: 250px;
            width: 100%;
            padding: 10px;
        }

        /* Table Styles */
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .table-controls input {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            width: 300px;
            outline: none;
        }

        .table-controls button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .table-controls button:hover {
            background-color: #0284c7;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 6px 4px;
            text-align: center;
        }

        th {
            background-color: rgba(255,255,255,0.02);
            color: var(--text-muted);
            font-weight: 600;
        }

        .habit-name-cell {
            text-align: left;
            padding-left: 12px;
            min-width: 180px;
            color: var(--text-main);
        }

        /* Custom Checkboxes */
        .check-grid input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            background-color: transparent;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .check-grid input[type="checkbox"]:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }
        
        .delete-btn:hover {
            color: var(--accent-red);
        }

        .progress-bar-bg {
            background-color: var(--border-color);
            height: 6px;
            border-radius: 3px;
            width: 100%;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent-blue);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <div class="panel">
                <h2 style="text-align: center; margin-bottom: 20px; color: var(--accent-blue);">August 2024</h2>
                <div class="stats-box">
                    <h3>Total Habits</h3>
                    <div class="value" id="totalHabits">0</div>
                </div>
                <div class="stats-box">
                    <h3>Completed</h3>
                    <div class="value val-green" id="totalCompleted">0</div>
                </div>
                <div class="stats-box">
                    <h3>Remaining</h3>
                    <div class="value val-red" id="totalRemaining">0</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="top-widgets">
                    <div class="circle-progress">
                        <div class="circle" id="momentumCircle">0%</div>
                        <span style="color: var(--text-muted); font-size: 12px; text-transform: uppercase;">Daily Progress</span>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="panel">
                <div class="table-controls">
                    <h3 style="color: var(--text-muted); text-transform: uppercase; font-size: 14px;">Daily Habits Tracking</h3>
                    <div>
                        <input type="text" id="newHabit" placeholder="Enter habit name...">
                        <button onclick="addHabit()">+ Add</button>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="check-grid">
                        <thead>
                            <tr id="daysHeader">
                                <th class="habit-name-cell">Habit</th>
                                <th>%</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="trackerBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DAYS = 31;
        let habitsData = JSON.parse(localStorage.getItem('proHabits')) || [];
        let chartInstance = null;

        function initApp() {
            buildTableHeaders();
            renderTable();
        }

        function buildTableHeaders() {
            const tr = document.getElementById('daysHeader');
            for(let i = 1; i <= DAYS; i++) {
                const th = document.createElement('th');
                th.innerText = i;
                tr.insertBefore(th, tr.children[i]);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('trackerBody');
            tbody.innerHTML = '';
            
            let globalCompleted = 0;
            let dailyData = new Array(DAYS).fill(0);

            habitsData.forEach((habit, hIndex) => {
                const tr = document.createElement('tr');
                
                let rowHtml = `<td class="habit-name-cell">${habit.name}</td>`;
                let rowCompleted = 0;

                for(let d = 0; d < DAYS; d++) {
                    const isChecked = habit.ticks[d] ? 'checked' : '';
                    if(habit.ticks[d]) {
                        rowCompleted++;
                        globalCompleted++;
                        dailyData[d]++;
                    }
                    rowHtml += `<td><input type="checkbox" ${isChecked} onchange="toggleTick(${hIndex}, ${d})"></td>`;
                }

                const percent = Math.round((rowCompleted / DAYS) * 100);

                rowHtml += `
                    <td>
                        <div style="font-weight: bold; color: var(--accent-blue);">${percent}%</div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${percent}%;"></div></div>
                    </td>
                    <td><button class="delete-btn" onclick="removeHabit(${hIndex})">🗑️</button></td>
                `;

                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });

            updateDashboardStats(globalCompleted, dailyData);
        }

        function updateDashboardStats(completed, dailyData) {
            const total = habitsData.length * DAYS;
            const remaining = total > 0 ? total - completed : 0;
            const avgPercent = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('totalHabits').innerText = habitsData.length;
            document.getElementById('totalCompleted').innerText = completed;
            document.getElementById('totalRemaining').innerText = remaining;
            
            const circle = document.getElementById('momentumCircle');
            circle.innerText = avgPercent + '%';
            circle.style.borderTopColor = avgPercent > 50 ? 'var(--accent-green)' : 'var(--accent-blue)';

            drawChart(dailyData);
        }

        function drawChart(dataArray) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const labels = Array.from({length: DAYS}, (_, i) => i + 1);

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Completed Habits',
                        data: dataArray,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.15)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#10b981',
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: habitsData.length > 0 ? habitsData.length : 1,
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', stepSize: 1 }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function addHabit() {
            const input = document.getElementById('newHabit');
            const val = input.value.trim();
            if(val) {
                habitsData.push({ name: val, ticks: new Array(DAYS).fill(false) });
                input.value = '';
                saveData();
            }
        }

        function toggleTick(hIndex, dIndex) {
            habitsData[hIndex].ticks[dIndex] = !habitsData[hIndex].ticks[dIndex];
            saveData();
        }

        function removeHabit(index) {
            habitsData.splice(index, 1);
            saveData();
        }

        function saveData() {
            localStorage.setItem('proHabits', JSON.stringify(habitsData));
            renderTable();
        }

        initApp();
    </script>
</body>
</html>
