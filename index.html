<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nullsto - Disposable Temporary Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: #111111;
            --bg-input: #0a0a0a;
            --accent: #00ff88; /* Nullsto Green */
            --accent-hover: #00cc6a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
        }
        .logo span { color: var(--accent); }

        .nav-links a {
            color: var(--text-muted);
            margin-left: 25px;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .nav-links a:hover { color: var(--accent); }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 700;
            margin-left: 25px;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
            flex: 1;
        }

        /* Hero / Email Section */
        .email-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease;
        }

        .subtitle {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            line-height: 1.2;
        }
        
        .email-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 700px;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.05);
            position: relative;
            overflow: hidden;
        }

        .email-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent);
        }

        .email-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            color: #fff;
            word-break: break-all;
            margin-right: 15px;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background: var(--accent);
            color: #000;
        }

        .btn-new {
            background: #222;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-new:hover { background: #333; }

        /* Inbox Styles */
        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .inbox-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .email-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .email-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .email-item:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .email-info {
            flex: 1;
        }

        .email-from {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .email-sub {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .email-body {
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 600px;
        }

        .email-time {
            color: var(--text-muted);
            font-size: 0.8rem;
            white-space: nowrap;
            margin-left: 20px;
        }

        .delete-btn {
            color: #ff4444;
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 15px;
            font-size: 1.1rem;
            opacity: 0;
            transition: 0.2s;
        }

        .email-item:hover .delete-btn {
            opacity: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px dashed var(--border);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 999;
        }
        .toast.show { opacity: 1; bottom: 50px; }

        @media (max-width: 600px) {
            .email-box { flex-direction: column; gap: 15px; }
            .email-display { font-size: 1.1rem; text-align: center; }
            .btn-copy { width: 100%; justify-content: center; }
            h1 { font-size: 1.8rem; }
            .email-body { display: none; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NULLSTO<span>.MAIL</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#" class="btn-primary">API Access</a>
        </div>
    </nav>

    <div class="container">
        
        <!-- Email Generator Part -->
        <section class="email-section">
            <div class="subtitle">Secure Anonymous Email</div>
            <h1>Protect your privacy with<br>Temp Mail</h1>
            
            <div class="email-box">
                <div class="email-display" id="emailText">generating...</div>
                <button class="btn-copy" onclick="copyEmail()">
                    <i class="far fa-copy"></i> Copy
                </button>
            </div>

            <button class="btn-new" onclick="generateNewEmail()">
                <i class="fas fa-sync-alt"></i> Generate New
            </button>
        </section>

        <!-- Inbox Part -->
        <section class="inbox-section">
            <div class="inbox-header">
                <div class="inbox-title">Inbox <span id="msgCount" style="font-weight:400; font-size:0.9rem; color:#666;">(0)</span></div>
                <button onclick="clearAll()" style="background:none; border:none; color:#666; cursor:pointer; font-size:0.9rem;">Clear All</button>
            </div>

            <div class="email-list" id="inbox">
                <!-- Emails will load here -->
            </div>
        </section>

    </div>

    <div class="toast" id="toast">Copied to Clipboard!</div>

    <footer>
        &copy; 2023 Nullsto Mail. All rights reserved.
    </footer>

    <script>
        // --- CONFIGURATION ---
        const domains = ["@nullsto.com", "@nullsto.net", "@guerrillamail.info"];
        const prefixes = ["user", "anon", "temp", "john", "dev", "nullsto"];
        
        let currentEmail = "";

        // --- FUNCTIONS ---

        function generateRandomString(length) {
            let result = '';
            const characters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        function generateNewEmail() {
            const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const randomString = generateRandomString(6);
            const randomDomain = domains[Math.floor(Math.random() * domains.length)];
            
            currentEmail = `${randomPrefix}.${randomString}${randomDomain}`;
            
            document.getElementById('emailText').innerText = currentEmail;
            
            // Reset Inbox
            renderInbox([]);
            showToast("New Email Generated!");
        }

        function copyEmail() {
            navigator.clipboard.writeText(currentEmail).then(() => {
                showToast("Email Address Copied!");
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // --- INBOX SIMULATION ---
        
        // Fake data for demo
        const fakeEmails = [
            { from: "Amazon Order", sub: "Your order has shipped", body: "Your package is on the way. Track your delivery here.", time: "10 sec ago" },
            { from: "Netflix", sub: "Update payment method", body: "We were unable to process your latest payment.", time: "2 min ago" },
            { from: "Google Support", sub: "Security Alert", body: "New device signed in to your account.", time: "1 hour ago" }
        ];

        let inboxData = [];

        function renderInbox(data) {
            const container = document.getElementById('inbox');
            const countSpan = document.getElementById('msgCount');
            
            countSpan.innerText = `(${data.length})`;

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-envelope-open"></i>
                        <h3>No new messages</h3>
                        <p>Your inbox is empty. Incoming emails will appear here.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            data.forEach((email, index) => {
                const div = document.createElement('div');
                div.className = 'email-item';
                div.innerHTML = `
                    <div class="email-info">
                        <div class="email-from">${email.from}</div>
                        <div class="email-sub">${email.sub}</div>
                        <div class="email-body">${email.body}</div>
                    </div>
                    <div class="email-time">${email.time}</div>
                    <button class="delete-btn" onclick="deleteEmail(${index})"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
        }

        function deleteEmail(index) {
            inboxData.splice(index, 1);
