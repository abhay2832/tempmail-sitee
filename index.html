<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 REAL SMS BOMBER - PUBLIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 30px; 
            font-size: 2.2em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
            background: white;
        }
        textarea { resize: vertical; min-height: 100px; }
        .bomb-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bomb-btn:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(255,107,107,0.4); }
        .bomb-btn:active { transform: scale(0.98); }
        .bomb-btn:disabled {
            background: #ccc;
            transform: none;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .progress { background: #fff3cd; color: #856404; }
        .char-count { text-align: right; color: #666; font-size: 14px; margin-top: 5px; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 REAL SMS BOMBER</h1>
        
        <div class="warning">
            ⚠️ Public Testing Only | Legal Use | 10 SMS Free Daily
        </div>

        <form id="bomberForm">
            <div class="input-group">
                <label>🌍 Country Code</label>
                <select id="country">
                    <option value="91">🇮🇳 India (+91)</option>
                    <option value="1">🇺🇸 USA (+1)</option>
                    <option value="44">🇬🇧 UK (+44)</option>
                    <option value="971">🇦🇪 UAE (+971)</option>
                </select>
            </div>

            <div class="input-group">
                <label>📱 Phone Number</label>
                <input type="tel" id="number" placeholder="9876543210" required>
            </div>

            <div class="input-group">
                <label>💬 Message (160 chars)</label>
                <textarea id="message" maxlength="160" placeholder="Hello! This is test message 🔥" required></textarea>
                <div class="char-count" id="charCount">0/160</div>
            </div>

            <div class="input-group">
                <label>💥 Bomb Count</label>
                <input type="number" id="count" value="5" min="1" max="20" required>
            </div>

            <button type="submit" class="bomb-btn" id="bombBtn">
                💥 START REAL SMS BOMB
            </button>
        </form>

        <div class="status" id="status"></div>
    </div>

    <script>
        // TextLocal API - FREE SMS India
        const API_KEY = 'apikey=YOUR_TEXTLOCAL_API_KEY'; // textlocal.in se free key lo
        const SENDER = 'TXTLCL';

        const form = document.getElementById('bomberForm');
        const status = document.getElementById('status');
        const bombBtn = document.getElementById('bombBtn');
        const message = document.getElementById('message');
        const charCount = document.getElementById('charCount');

        // Character counter
        message.addEventListener('input', () => {
            charCount.textContent = `${message.value.length}/160`;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const country = document.getElementById('country').value;
            const number = document.getElementById('number').value;
            const msg = document.getElementById('message').value;
            const count = parseInt(document.getElementById('count').value);
            
            const fullNumber = `+${country}${number}`;
            
            bombBtn.disabled = true;
            bombBtn.textContent = '💥 SENDING...';
            showStatus('🚀 Starting SMS Bomb...', 'progress');

            let successCount = 0;
            
            for(let i = 1; i <= count; i++) {
                try {
                    const response = await fetch(`https://api.textlocal.in/send/?${API_KEY}&message=${encodeURIComponent(msg)}&numbers=${fullNumber}&sender=${SENDER}`);
                    const data = await response.json();
                    
                    if(data.status === 'success') {
                        successCount++;
                        showStatus(`✅ SMS ${i}/${count} sent successfully! (${successCount} total)`, 'success');
                    } else {
                        showStatus(`❌ SMS ${i} failed: ${data.errors[0].message}`, 'error');
                    }
                } catch(error) {
                    showStatus(`❌ Network error on SMS ${i}: ${error.message}`, 'error');
                }
                
                // 2 second delay between SMS
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            
            bombBtn.disabled = false;
            bombBtn.textContent = '💥 START AGAIN';
            showStatus(`🎉 Bomb Complete! ${successCount}/${count} SMS delivered!`, 'success');
        });

        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
