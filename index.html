<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Temp Mail</title><style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin: 15px auto;
  max-width: 400px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #22c55e;
  cursor: pointer;
}

.mail {
  background: #334155;
  margin-top: 10px;
  padding: 10px;
  border-radius: 5px;
  text-align: left;
}
</style></head><body><h2>📧 Real Temp Mail</h2><div class="box">
<input type="text" id="email" readonly placeholder="Click create">
<button onclick="createEmail()">Create Email</button>
<button onclick="loadInbox()">Refresh Inbox</button>
</div><div class="box" id="inbox">
No mails yet...
</div><script>
let token = "";
let address = "";

async function createEmail() {
  // get domain
  let res = await fetch("https://api.mail.tm/domains");
  let data = await res.json();
  let domain = data["hydra:member"][0].domain;

  // create account
  let random = Math.random().toString(36).substring(2,10);
  address = random + "@" + domain;

  await fetch("https://api.mail.tm/accounts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      address: address,
      password: "12345678"
    })
  });

  // login
  let login = await fetch("https://api.mail.tm/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      address: address,
      password: "12345678"
    })
  });

  let loginData = await login.json();
  token = loginData.token;

  document.getElementById("email").value = address;
  document.getElementById("inbox").innerHTML = "Email created. Wait for OTP...";
}

async function loadInbox() {
  if (!token) {
    alert("Create email first!");
    return;
  }

  let res = await fetch("https://api.mail.tm/messages", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  let data = await res.json();

  if (data["hydra:member"].length === 0) {
    document.getElementById("inbox").innerHTML = "No messages yet...";
    return;
  }

  let html = "";

  for (let msg of data["hydra:member"]) {
    html += `
      <div class="mail">
        <b>${msg.subject}</b><br>
        From: ${msg.from.address}
      </div>
    `;
  }

  document.getElementById("inbox").innerHTML = html;
}
</script></body>
</html>
